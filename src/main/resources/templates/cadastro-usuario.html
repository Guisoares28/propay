<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
	<head>
		<meta charset="utf-8">
	    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">	
	    <title>Cadastro de Usuarios</title>
	</head>
	<body class="bg-light d-flex justify-content-center align-items-center vh-100">
		<div class="col-12 col-md-6 col-lg-4">
			<h3>Cadastro de usuário</h3>
			<form th:action="@{/usuario}" th:object="${usuario}" method='post'>
				  <div class="mb-3">
			        <label class="form-label">Email</label>
			        <input type="email"  class="form-control" th:field="*{email}" required>
			      </div>
			
			    <div class="mb-3">
			        <label class="form-label">Senha</label>
			        <input type="password" class="form-control" th:field="*{senha}" required>
			    </div>
			
			    <div class="mb-3">
			        <label class="form-label">Nome</label>
			        <input type="text" class="form-control" th:field="*{nome}" required>
			    </div>
			    
			     <div class="text-danger" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}">
				</div>
			
			    <button type="submit" class="btn btn-success w-100">
			        Cadastrar
			    </button>
			   
			</form>
		</div>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
		
	</body>
</html>
