spring.application.name=payPro
# URL de conexão: localhost porque o Spring está rodando na sua máquina
# e o Docker mapeou a porta 5432 para o seu host.
spring.datasource.url=jdbc:postgresql://localhost:5432/paypro
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurações do Hibernate / JPA
# update: Cria as tabelas automaticamente se elas não existirem
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect